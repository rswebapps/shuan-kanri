// 印刷用の表示曜日を決定（土日はデータがある方のみ、最大6列＋月曜前日曜）
function getPrintDKeys(){
  const vsl=visSlots();
  // 土・日のどちらかにデータがあるか確認
  const hasSatData=S.showSat&&vsl.some(sl=>sl.base!=='none'&&['sat'].some(dk=>{
    const c=getCell(curMonth,curWeek,sl.id,dk);return c.s1||c.s2;
  }));
  const hasSunData=S.showSun&&vsl.some(sl=>sl.base!=='none'&&['sun'].some(dk=>{
    const c=getCell(curMonth,curWeek,sl.id,dk);return c.s1||c.s2;
  }));
  const base=['mon','tue','wed','thu','fri'];
  if(hasSunData) base.unshift('sun'); // 日曜は月曜の左
  if(hasSatData) base.push('sat');
  return base;
}

// 印刷用集計HTMLを生成
function buildPrintSummary(){
  const ts=targets();
  const totalWks=S.yearTotalWeeks||35;
  // 経過有効週数（学期・年度用）
  const semMonths=SEMS[curSem].months;
  const ci=semMonths.indexOf(curMonth);
  const semWks=semMonths.slice(0,ci).reduce((s,m)=>s+validWeeksForMonth(m).length,0)
               +validWeeksForMonth(curMonth).filter(w=>w<=curWeek).length;
  let yearWks=0;let reached=false;
  for(const m of MONTH_ORDER){
    for(const w of validWeeksForMonth(m)){
      if(m===curMonth&&w===curWeek){yearWks++;reached=true;break;}
      yearWks++;
    }
    if(reached) break;
  }
  const wAct=calcWeek(curMonth,curWeek);
  const sAct=calcCumSem();
  const yAct=calcCumulative();

  function tbl(label,actual,period){
    let rows='';
    ts.forEach(t=>{
      const d=actual[t]||{full:0,half:0,mod:0,tot:0};
      const pl=planForTarget(t);
      const nonMod=d.full+d.half*0.5; // 実数
      const modV=d.tot-nonMod; // 実数
      const rPlan=calcRate(d.tot,pl.planTotal,period,totalWks);
      const planCls=rateCls(rPlan);
      if(label==='当週実施数'){
        rows+=`<tr><td>${t}</td><td>${d.full||'-'}</td><td>${d.half||'-'}</td><td>${d.mod||'-'}</td><td>${fmtN(d.tot)||'-'}</td></tr>`;
      } else {
        rows+=`<tr><td>${t}</td><td class="${rateCls(calcRate(nonMod,pl.planFull,period,totalWks))}">${fmtRate(calcRate(nonMod,pl.planFull,period,totalWks))}</td><td class="${rateCls(calcRate(modV,pl.planMod,period,totalWks))}">${fmtRate(calcRate(modV,pl.planMod,period,totalWks))}</td><td class="${planCls}">${fmtRate(rPlan)}</td></tr>`;
      }
    });
    const hd=label==='当週実施数'?'<th>教科</th><th>フル</th><th>½</th><th>モ</th><th>計</th>':
      '<th>教科</th><th>モ外%</th><th>モ%</th><th>計%</th>';
    return `<div><div class="ps-title">${label}</div>
      <table><thead><tr>${hd}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  return `<div class="ps-row">
    ${tbl('当週実施数',wAct,1)}
    ${tbl('学期累計 計画実施率',sAct,semWks)}
    ${tbl('年度累計 計画実施率',yAct,yearWks)}
  </div>`;
}

function printWeek(skipTitle=false){
  if(curView!=='sem'){alert('週案タブを表示した状態で印刷してください。');return;}
  const pdk=getPrintDKeys();
  const allDk=visibleDKeys();

  // ヘッダーth に印刷列制御クラスを付与
  document.querySelectorAll('#tth th').forEach((th,i)=>{
    if(i===0){th.classList.remove('print-hide-col');return;}
    const dk=allDk[i-1];
    if(pdk.includes(dk)) th.classList.remove('print-hide-col');
    else th.classList.add('print-hide-col');
  });
  // data-dk を持つすべてのtd（スロット行 + 日別メモ行）を一括制御
  document.querySelectorAll('#ttb td[data-dk]').forEach(td=>{
    if(pdk.includes(td.dataset.dk)) td.classList.remove('print-hide-col');
    else td.classList.add('print-hide-col');
  });
  document.querySelectorAll('td.sltd').forEach(td=>td.classList.remove('print-hide-col'));
  // colspan調整：週単位メモ行（notes）のみ対象
  const printCols=pdk.length;
  document.querySelectorAll('td.memo-cell[colspan]').forEach(td=>{
    td.setAttribute('colspan',printCols);
  });

  document.getElementById('print-summary').innerHTML=buildPrintSummary();

  // 印刷ヘッダー（配布用印刷からの呼び出し時はスキップ）
  if(!skipTitle){
    const mondayStr2=getEffectiveMonday(curMonth,curWeek);
    const dateLabel2=mondayStr2?(()=>{
      const dt=new Date(mondayStr2),fe=new Date(mondayStr2);fe.setDate(fe.getDate()+4);
      return `${dt.getMonth()+1}/${dt.getDate()}〜${fe.getMonth()+1}/${fe.getDate()}`;
    })():'';
    document.getElementById('print-hd-title').textContent=
      `${S.year}年度　${S.cls||''}　${curMonth}月 第${curWeek}週　週案`;
    document.getElementById('print-hd-sub').textContent=
      `${dateLabel2}　担任：${S.teacher||''}`;
  }

  // ── textarea → div に変換してテキスト全表示 ──
  const taMap=[];
  document.querySelectorAll('#tt-wrap textarea[data-memokey]').forEach(ta=>{
    const div=document.createElement('div');
    div.className='print-ta-div';
    div.textContent=ta.value;
    div.dataset.memokey=ta.dataset.memokey;
    if(ta.dataset.dk) div.dataset.dk=ta.dataset.dk;
    ta.parentNode.replaceChild(div,ta);
    taMap.push({div,val:ta.value,key:ta.dataset.memokey,dk:ta.dataset.dk||null});
  });

  window.print();

  // ── 印刷後に div → textarea に戻す ──
  setTimeout(()=>{
    taMap.forEach(({div,val,key,dk})=>{
      const ta=document.createElement('textarea');
      ta.dataset.memokey=key;
      if(dk) ta.dataset.dk=dk;
      ta.value=val;
      ta.style.cssText='width:100%;border:none;background:transparent;font-family:inherit;font-size:11px;resize:none;padding:1px 3px;outline:none;color:var(--text);min-height:20px;overflow:hidden';
      autoGrowTA(ta);
      ta.addEventListener('input',()=>{autoGrowTA(ta);setWeekMemo(curMonth,curWeek,ta.dataset.memokey,ta.value,ta.dataset.dk||null);});
      div.parentNode.replaceChild(ta,div);
    });
    document.querySelectorAll('.print-hide-col').forEach(el=>el.classList.remove('print-hide-col'));
    // notes行のcolspanを元に戻す（日別メモ行はcolspan不使用）
    document.querySelectorAll('td.memo-cell[colspan]').forEach(td=>td.setAttribute('colspan',allDk.length));
    document.getElementById('print-summary').innerHTML='';
  },600);
}

function exportExcel(){
  if(curView!=='sem'){alert('週案タブを表示した状態でExcel出力してください。');return;}
  if(typeof XLSX==='undefined'){alert('SheetJSの読み込みに失敗しました。');return;}

  const vsl=visSlots();
  const vdk=visibleDKeys();
  const mondayStr=getEffectiveMonday(curMonth,curWeek);
  const memos=getWeekMemos(curMonth,curWeek);
  const ts=targets();

  const dkLabel=dk=>{
    const lbl=DAY_LABELS[dk];
    if(!mondayStr) return lbl+'曜日';
    const dt=new Date(mondayStr);dt.setDate(dt.getDate()+DAY_OFFSETS[dk]);
    return `${lbl}曜\n${dt.getMonth()+1}/${dt.getDate()}`;
  };
  const dkInactive=dk=>{
    if(!mondayStr) return false;
    const dt=new Date(mondayStr);dt.setDate(dt.getDate()+DAY_OFFSETS[dk]);
    return dt.getMonth()+1!==curMonth;
  };

  // ─── シート1：週案 ───
  const aoa=[];
  const nCols=1+vdk.length;
  // タイトル行（結合用）
  const dateLabel=mondayStr?(()=>{
    const dt=new Date(mondayStr),fe=new Date(mondayStr);fe.setDate(fe.getDate()+4);
    return `${dt.getMonth()+1}/${dt.getDate()}〜${fe.getMonth()+1}/${fe.getDate()}　担任：${S.teacher||''}`;
  })():'';
  aoa.push([`${S.year}年度　${S.cls||''}　${curMonth}月 第${curWeek}週　週案`,...Array(nCols-1).fill('')]);
  aoa.push([dateLabel,...Array(nCols-1).fill('')]);
  aoa.push(Array(nCols).fill(''));
  aoa.push(['時間',...vdk.map(dk=>dkLabel(dk))]);

  const order=buildRenderOrder(vsl);
  for(const item of order){
    if(item.type==='memo'&&item.perDay){
      // 日別メモ行：曜日ごとに1セル
      const row=[item.label];
      for(const dk of vdk){
        row.push(dkInactive(dk)?'':(memos[item.key]?.[dk]||''));
      }
      aoa.push(row);
      continue;
    }
    if(item.type==='note'){
      aoa.push([item.label,memos.notes[item.idx]||'',...Array(nCols-2).fill('')]);
      continue;
    }
    const sl=item.sl;
    const isMod=sl.base==='mod',isFull=sl.base==='full',isNone=sl.base==='none';
    const slLbl=isFull?sl.label+'時間目':isMod?`${sl.label}(1/${sl.modN}単位)`:sl.label;
    if(isNone){aoa.push([slLbl,...vdk.map(()=>'')]);continue;}
    const row=[slLbl];
    for(const dk of vdk){
      if(dkInactive(dk)){row.push('');continue;}
      const c=getCell(curMonth,curWeek,sl.id,dk);
      let cell='';
      if(c.s1){
        cell+=c.s1;
        if(c.s2) cell+='\n'+c.s2;
        if(c.m1) cell+='\n'+c.m1;
        if(c.s2&&c.m2) cell+='\n'+c.m2;
      }
      row.push(cell);
    }
    aoa.push(row);
  }

  // ─── シート2：集計 ───
  const totalWks=S.yearTotalWeeks||35;
  const wAct=calcWeek(curMonth,curWeek);
  const semMonths=SEMS[curSem].months;
  const ci2=semMonths.indexOf(curMonth);
  const semWks2=semMonths.slice(0,ci2).reduce((s,m)=>s+validWeeksForMonth(m).length,0)
               +validWeeksForMonth(curMonth).filter(w=>w<=curWeek).length;
  let yearWks2=0;let reached2=false;
  for(const m of MONTH_ORDER){
    for(const w of validWeeksForMonth(m)){
      if(m===curMonth&&w===curWeek){yearWks2++;reached2=true;break;}
      yearWks2++;
    }
    if(reached2) break;
  }
  const sAct2=calcCumSem(),yAct2=calcCumulative();
  const jAoa=[
    ['教科','フル','½','モ','計','学期計画率%','学期標準率%','年度計画率%','年度標準率%']
  ];
  ts.forEach(t=>{
    const dw=wAct[t]||{full:0,half:0,mod:0,tot:0};
    const ds=sAct2[t]||{full:0,half:0,mod:0,tot:0};
    const dy=yAct2[t]||{full:0,half:0,mod:0,tot:0};
    const pl=planForTarget(t);
    const sRate=calcRate(ds.tot,pl.planTotal,semWks2,totalWks);
    const sStd=calcRate(ds.tot,pl.planStd,semWks2,totalWks);
    const yRate=calcRate(dy.tot,pl.planTotal,yearWks2,totalWks);
    const yStd=calcRate(dy.tot,pl.planStd,yearWks2,totalWks);
    // ★ Excel には実数をそのまま出力（表示書式はExcel側で設定）
    jAoa.push([t, dw.full, dw.half, dw.mod, dw.tot,
      sRate!==null?sRate:'',
      sStd!==null?sStd:'',
      yRate!==null?yRate:'',
      yStd!==null?yStd:'']);
  });

  // ─── ワークブック組み立て ───
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const js=XLSX.utils.aoa_to_sheet(jAoa);

  // A4縦想定：有効幅約190mm。列幅を mm 換算（1文字≈2.5mm）で配分
  // ラベル列14mm≒5.6文字、曜日列は均等分割
  const dayColW=Math.floor((190-14)/vdk.length); // mm
  const dayWch=Math.round(dayColW/2.5); // Excel文字幅単位
  ws['!cols']=[{wch:6},...vdk.map(()=>({wch:Math.max(dayWch,10)}))];
  // 行高：ヘッダー行は高め、データ行は標準
  ws['!rows']=[{hpx:20},{hpx:15},{hpx:4},{hpx:22}];
  // タイトル2行はセル結合
  ws['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:nCols-1}},
    {s:{r:1,c:0},e:{r:1,c:nCols-1}},
  ];
  // 週メモ行（notes）のみセル結合。日別メモ行は結合不要
  let rowIdx=4;
  for(const item of order){
    if(item.type==='note'){
      ws['!merges'].push({s:{r:rowIdx,c:1},e:{r:rowIdx,c:nCols-1}});
    }
    rowIdx++;
  }
  // 集計シート列幅
  js['!cols']=[{wch:12},{wch:5},{wch:5},{wch:5},{wch:5},{wch:9},{wch:9},{wch:9},{wch:9}];

  XLSX.utils.book_append_sheet(wb,ws,'週案');
  XLSX.utils.book_append_sheet(wb,js,'集計');
  const fname=`${S.year}年度_${S.cls||'クラス未設定'}_${curMonth}月第${curWeek}週_週案.xlsx`;
  XLSX.writeFile(wb,fname);
}

// ─── 配布用印刷（バッジ・集計表なし）────────────────────────────
function printForStudents(){
  if(curView!=='sem'){alert('週案タブを表示した状態で印刷してください。');return;}
  document.body.classList.add('print-student');

  const hiraOn=document.getElementById('chk-hira')?.checked;
  const hiraMap=[]; // {target, orig} — target は Element か TextNode

  if(hiraOn){
    // 教科名チップ（.sname）
    document.querySelectorAll('#ttb .sname').forEach(el=>{
      const orig=el.textContent;
      const hira=HIRA[orig];
      if(hira){el.textContent=hira;hiraMap.push({el,orig});}
    });
    // スロットラベル（td.sltd）：<br>を含む場合は最初のテキストノードのみ
    document.querySelectorAll('#ttb td.sltd, #tth th').forEach(el=>{
      const node=[...el.childNodes].find(n=>n.nodeType===Node.TEXT_NODE);
      if(node){
        const orig=node.textContent.trim();
        const hira=HIRA_UI[orig];
        if(hira){node.textContent=hira;hiraMap.push({node,orig,isNode:true});}
      }
    });
    // メモ行ラベル（td.memo-hd）
    document.querySelectorAll('#ttb td.memo-hd').forEach(el=>{
      const orig=el.textContent;
      const hira=HIRA_UI[orig];
      if(hira){el.textContent=hira;hiraMap.push({el,orig});}
    });
  }

  // ── 令和形式タイトルを設定（printWeekのタイトル設定をスキップ） ──
  const wareki=S.year-2018;
  const warekiStr=wareki===1?'元':String(wareki);
  const mondayStr=getEffectiveMonday(curMonth,curWeek);
  let dateRange='';
  if(mondayStr){
    const dt=new Date(mondayStr),fe=new Date(mondayStr);
    fe.setDate(fe.getDate()+4);
    dateRange=`（${dt.getMonth()+1}/${dt.getDate()}）〜（${fe.getMonth()+1}/${fe.getDate()}）`;
  }
  if(hiraOn){
    document.getElementById('print-hd-title').textContent=
      `れいわ${warekiStr}ねんど　${curMonth}がつ　だい${curWeek}しゅう　${dateRange}　じかんわり`;
    document.getElementById('print-hd-sub').textContent=
      `たんにん：${S.teacher||''}`;
  } else {
    document.getElementById('print-hd-title').textContent=
      `令和${warekiStr}年度　${S.cls||''}　${curMonth}月　第${curWeek}週　${dateRange}　時間割`;
    document.getElementById('print-hd-sub').textContent=
      `担任：${S.teacher||''}`;
  }

  printWeek(true); // skipTitle=true でタイトル上書きを防ぐ

  setTimeout(()=>{
    // ひらがな復元
    hiraMap.forEach(({el,node,orig,isNode})=>{
      if(isNode) node.textContent=orig;
      else el.textContent=orig;
    });
    document.body.classList.remove('print-student');
  },800);
}

// ─── 【④】リサイザー ─────────────────────────────────────────────
function initResizer(){
  const resizer=document.getElementById('jisuu-resizer');
  const jisuu=document.getElementById('jisuu');
  let startX=0,startW=0,dragging=false;
  resizer.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startW=jisuu.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.userSelect='none';
    document.body.style.cursor='col-resize';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const diff=startX-e.clientX; // 右から左にドラッグ→広がる
    const newW=Math.max(160,Math.min(480,startW+diff));
    jisuu.style.width=newW+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;resizer.classList.remove('dragging');
    document.body.style.userSelect='';document.body.style.cursor='';
  });
  // ダブルクリックでデフォルト幅に戻す
  resizer.addEventListener('dblclick',()=>{jisuu.style.width='238px';});
}
function initYearSel(){
  const sel=document.getElementById('inp-year');
  const ty=curAcYear();
  for(let y=ty-2;y<=ty+2;y++){
    const o=document.createElement('option');
    o.value=y;o.textContent=y+'年度';if(y===S.year)o.selected=true;
    sel.appendChild(o);
  }
  sel.onchange=()=>{S.year=+sel.value;save();};
}
function init(){
  load();
  const td=new Date();
  document.getElementById('hd-today').textContent=`${td.getFullYear()}年${td.getMonth()+1}月${td.getDate()}日`;
  initYearSel();
  document.getElementById('inp-class').value=S.cls||'';
  document.getElementById('inp-teacher').value=S.teacher||'';
  document.getElementById('inp-class').oninput=e=>{S.cls=e.target.value;save();updateRequiredFieldStyles();checkSetupRequired();};
  document.getElementById('inp-teacher').oninput=e=>{S.teacher=e.target.value;save();updateRequiredFieldStyles();checkSetupRequired();};
  // ヘッダーボタン
  document.getElementById('btn-save-file').onclick=()=>saveToFile();
  document.getElementById('btn-open-file').onclick=()=>loadFromFile();
  document.getElementById('btn-print').onclick=()=>printWeek();
  document.getElementById('btn-print-student').onclick=()=>printForStudents();
  document.getElementById('btn-excel').onclick=()=>exportExcel();
  initResizer();
  // JSON保存ガイダンス
  document.getElementById('json-banner-save').onclick=()=>saveToFile();
  document.getElementById('json-banner-close').onclick=()=>hideBanner();
  document.getElementById('setup-banner-go').onclick=()=>{
    // 設定タブの学級・交流設定を開く
    document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));
    document.querySelector('.stab[data-view="cfg"]').classList.add('on');
    curCfgTab='koury';
    showView('cfg');
  };
  startJsonStatusTimer();
  checkBannerOnStartup();
  updateRequiredFieldStyles(); // ヘッダー必須入力欄の初期警告スタイル
  enforceSetupIfNeeded();      // 必須項目チェック・誘導
  // セムバー
  document.querySelectorAll('.stab').forEach(t=>{
    t.onclick=()=>{
      const v=t.dataset.view;
      // ⑤ 学年未設定時は週案・集計への遷移をブロック
      if(!S.gradeSet&&(v==='sem'||v==='year')){
        enforceSetupIfNeeded();
        return;
      }
      document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      if(v==='cfg') showView('cfg');
      else if(v==='year') showView('year');
      else{curSem=t.dataset.sem;showView('sem');setSem(curSem);}
    };
  });
  // 設定サブタブ
  document.querySelectorAll('.ctab').forEach(b=>b.onclick=()=>{curCfgTab=b.dataset.ct;renderCfg();});
  // 月曜日付（手動上書き）
  document.getElementById('wdate').onchange=e=>{
    if(e.target.value) setWDate(curMonth,curWeek,e.target.value);
    else{
      const y=mYear(curMonth);
      if(db[y]?.[curMonth]?.[curWeek]) delete db[y][curMonth][curWeek]._date;
      save();
    }
    refreshWbar();renderTT();
  };
  // 時数タブ（期間）
  document.querySelectorAll('.jtab').forEach(t=>t.onclick=()=>{
    jisuuTab=t.dataset.jt;
    document.querySelectorAll('.jtab').forEach(x=>x.classList.toggle('on',x===t));
    renderJisuu();
  });
  // 時数サブタブ（集計方法）
  document.querySelectorAll('.jsubtab').forEach(t=>t.onclick=()=>{
    jisuuSubTab=t.dataset.jst;
    document.querySelectorAll('.jsubtab').forEach(x=>x.classList.toggle('on',x===t));
    renderJisuu();
  });
  // パターンメニュー
  const psBtn=document.getElementById('psave-btn'),psSm=document.getElementById('psave-menu');
  const plBtn=document.getElementById('pload-btn'),plSm=document.getElementById('pload-menu');
  psBtn.onclick=e=>{e.stopPropagation();psSm.style.display=psSm.style.display==='none'?'block':'none';plSm.style.display='none';};
  plBtn.onclick=e=>{e.stopPropagation();plSm.style.display=plSm.style.display==='none'?'block':'none';psSm.style.display='none';};
  document.addEventListener('click',()=>{psSm.style.display='none';plSm.style.display='none';});
  // モーダル
  document.getElementById('modal-bg').onclick=e=>{if(e.target===e.currentTarget)closeModal();};
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeModal();
    if(e.key==='Enter'&&!e.shiftKey&&document.getElementById('modal-bg').classList.contains('on')){e.preventDefault();saveModal();}
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveToFile();}
  });
  // 初期表示：現在学期
  const m=td.getMonth()+1;
  curMonth=m;curSem=semOf(m);
  curWeek=validWeeksForMonth(m)[0]||1;
  const activeTab=document.querySelector(`.stab[data-sem="${curSem}"]`);
  if(activeTab)activeTab.classList.add('on');
  showView('sem');setSem(curSem);
}
init();
