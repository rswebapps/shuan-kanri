<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a6fc4">
<link rel="manifest" href="manifest.json">
<title>週案管理 RC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
<style>
:root{
  --blue:#1a6fc4;--blue-lt:#e8f2fc;--sem1:#1a6fc4;--sem2:#2e7d32;--sem3:#7b1fa2;
  --bg:#f2f5f9;--card:#fff;--border:#d8dde6;--text:#2c3e50;--muted:#8a93a0;
  --col-full:#1a6fc4;--col-half:#e65100;--col-mod:#7b1fa2;--col-plan:#558b2f;
  --col-pos:#2e7d32;--col-neg:#c62828;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo',sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;height:100vh;
  display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
#hd{background:var(--blue);color:#fff;padding:0 14px;height:46px;display:flex;
  align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#hd h1{font-size:15px;font-weight:700;white-space:nowrap}
.sep{opacity:.35;font-size:18px;margin:0 2px}
.hdf{display:flex;align-items:center;gap:4px;font-size:12px}
.hdf label{opacity:.7}
.hdf input,.hdf select{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:3px 7px;border-radius:5px;font-size:12px;font-family:inherit}
.hdf input::placeholder{color:rgba(255,255,255,.5)}
.hdf select option{color:#333;background:#fff}
#hd-today{font-size:11px;opacity:.7}
#hd-saved{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;display:none}
/* 保存状態インジケーター */
#hd-json-status{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;cursor:default;display:none}
#hd-json-status.saved{background:rgba(255,255,255,.15);color:rgba(255,255,255,.85)}
#hd-json-status.unsaved{background:rgba(220,50,50,.55);color:#fff;font-weight:700;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
/* 齟齬バナー */
#mismatch-banner{display:none;position:fixed;top:46px;left:0;right:0;z-index:149;
  background:#e65100;color:#fff;font-size:12px;font-weight:700;
  padding:7px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:opacity .3s}
#mismatch-banner.dimmed{opacity:.45;font-weight:400}
#mismatch-banner button{margin-left:10px;padding:3px 10px;background:#fff;border:none;
  border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
#mismatch-banner .mb-reload{color:#e65100}
#mismatch-banner .mb-continue{color:#555;background:rgba(255,255,255,.75)}
.hd-btn{padding:4px 10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);
  color:#fff;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:background .12s}
.hd-btn:hover{background:rgba(255,255,255,.32)}
.hd-btn.accent{background:rgba(255,255,255,.28);font-weight:700}
/* SEMBAR */
#sembar{background:var(--card);border-bottom:2px solid var(--border);
  display:flex;align-items:flex-end;padding:0 12px;flex-shrink:0}
.stab{padding:9px 16px 8px;cursor:pointer;font-size:13px;font-weight:700;
  border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted);
  transition:all .15s;border-radius:4px 4px 0 0;white-space:nowrap}
.stab:hover{background:#f5f6f8}
.stab.cfg.on{color:#444;border-bottom-color:#555;background:#f5f6f8}
.stab[data-sem="1"].on{color:var(--sem1);border-bottom-color:var(--sem1);background:#e8f2fc}
.stab[data-sem="2"].on{color:var(--sem2);border-bottom-color:var(--sem2);background:#e8f5e9}
.stab[data-sem="3"].on{color:var(--sem3);border-bottom-color:var(--sem3);background:#f3e5f5}
.stab[data-sem="year"].on{color:#bf360c;border-bottom-color:#bf360c;background:#fff3e0}
/* MBAR */
#mbar{background:#f8f9fc;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:5px 12px;gap:4px;flex-shrink:0}
.mtab{padding:4px 12px;cursor:pointer;font-size:12px;font-weight:600;border-radius:5px;
  color:var(--muted);border:1px solid transparent;transition:all .12s;background:#fff}
.mtab:hover{border-color:var(--border)}
.mtab.on[data-sem="1"]{background:var(--sem1);color:#fff}
.mtab.on[data-sem="2"]{background:var(--sem2);color:#fff}
.mtab.on[data-sem="3"]{background:var(--sem3);color:#fff}
/* WBAR */
#wbar{background:var(--blue-lt);border-bottom:1px solid var(--border);
  padding:6px 12px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.wbtn{padding:4px 10px;border:1px solid var(--blue);border-radius:4px;cursor:pointer;
  background:#fff;color:var(--blue);font-size:12px;font-family:inherit;transition:all .12s}
.wbtn:hover:not(.on){background:var(--blue-lt)}
.wbtn.on{background:var(--blue);color:#fff}
#wdate{padding:3px 7px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:12px}
.wbar-note{font-size:10px;color:var(--muted)}
.pat-wrap{position:relative;margin-left:auto}
.pat-btn{padding:4px 10px;background:#fff;border:1px solid var(--border);border-radius:4px;
  font-size:11px;cursor:pointer;font-family:inherit;color:var(--text)}
.pat-btn:hover{border-color:var(--blue);color:var(--blue)}
.pat-menu{position:absolute;top:100%;right:0;background:#fff;border:1px solid var(--border);
  border-radius:7px;box-shadow:0 4px 14px rgba(0,0,0,.15);z-index:100;
  min-width:190px;padding:4px 0;margin-top:2px;display:none}
.pat-item{padding:7px 14px;cursor:pointer;font-size:12px;white-space:nowrap}
.pat-item:hover{background:var(--blue-lt);color:var(--blue)}
.pat-item.no-data{color:var(--muted);cursor:default;font-style:italic}
.pat-item.no-data:hover{background:#fff}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
/* CFG VIEW */
#cfg-view{flex:1;display:none;flex-direction:column;overflow:hidden}
#cfg-view.on{display:flex}
#cfg-tabs{background:#f0f2f6;border-bottom:2px solid var(--border);
  display:flex;padding:8px 16px 0;gap:4px;flex-shrink:0}
.ctab{padding:7px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;
  font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;
  border-bottom:none;margin-bottom:-2px;font-family:inherit;transition:all .12s}
.ctab.on{background:var(--card);color:var(--blue);border-color:var(--border)}
.ctab:hover:not(.on){color:var(--text);background:rgba(255,255,255,.5)}
#cfg-body{flex:1;overflow-y:auto;padding:18px 20px 30px}
/* CFG COMMON */
.cfg-sec{margin-bottom:24px}
.cfg-sec h3{font-size:13px;font-weight:700;margin-bottom:8px;padding-bottom:6px;
  border-bottom:2px solid var(--blue-lt);color:var(--text)}
.cfg-note{font-size:11px;color:var(--muted);background:#f8f9fc;padding:7px 10px;
  border-radius:5px;border-left:3px solid var(--blue);margin-bottom:10px;line-height:1.6}
.cfg-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cfg-tbl th{background:#f0f4f9;color:var(--muted);padding:5px 7px;text-align:left;
  border:1px solid var(--border);font-size:11px;white-space:nowrap;font-weight:700}
.cfg-tbl td{padding:4px 6px;border:1px solid var(--border);vertical-align:middle}
.cfg-tbl input[type=text]{width:100%;padding:3px 6px;border:1px solid var(--border);
  border-radius:4px;font-size:12px;font-family:inherit}
.cfg-tbl input[type=number]{padding:3px 6px;border:1px solid var(--border);
  border-radius:4px;font-size:12px;font-family:inherit;text-align:right}
.cfg-tbl select{padding:3px 6px;border:1px solid var(--border);
  border-radius:4px;font-size:12px;font-family:inherit;max-width:120px}
.cfg-tbl input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--blue)}
.rbtn{padding:2px 7px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid}
.rbtn-up,.rbtn-dn{background:#e8f2fc;color:var(--blue);border-color:#bdd6f0}
.rbtn-del{background:#ffebee;color:#c62828;border-color:#ffcdd2}
.btn-add{padding:5px 12px;background:var(--blue);color:#fff;border:none;
  border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-add:hover{background:#155fa0}
.cfg-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{padding:7px 18px;background:#2e7d32;color:#fff;border:none;
  border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-save:hover{background:#1b5e20}
.koury-mode{display:flex;gap:18px;margin-bottom:12px}
.koury-mode label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
.koury-mode input{accent-color:var(--blue)}
.color-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,0,0,.1);
  display:inline-block;cursor:pointer;flex-shrink:0}
.child-id{font-size:14px;font-weight:700;text-align:center}
/* TIMETABLE */
#tt-wrap{flex:1;overflow:auto;padding:8px}
table#tt{border-collapse:collapse;width:100%;min-width:580px}
#tt th{background:var(--blue);color:#fff;padding:6px 8px;text-align:center;
  font-size:12px;font-weight:600;position:sticky;top:0;z-index:10;white-space:nowrap}
.th-sl{width:64px;left:0;z-index:15}
.th-dy{min-width:100px}
.th-sat{background:#1565c0!important}
.th-sun{background:#b71c1c!important}
td.sltd{background:#f7f9fc;font-size:11px;font-weight:700;text-align:center;
  padding:4px;border-right:2px solid var(--blue);position:sticky;left:0;z-index:5;
  vertical-align:middle;line-height:1.35;white-space:nowrap}
td.sltd.asa{background:#e8f5e9;color:#1b5e20}
td.sltd.gyo{background:#fff8e1;color:#e65100}
td.sltd.hiru{background:#fce4ec;color:#880e4f}
td.sltd.owari{background:#e8eaf6;color:#283593}
/* メモ行スタイル */
td.memo-hd{background:#fffde7;font-size:10px;font-weight:700;text-align:center;
  padding:2px 4px;border-right:2px solid #f9a825;position:sticky;left:0;z-index:5;
  color:#f57f17;white-space:nowrap;vertical-align:middle}
td.memo-hd.schedule-hd{background:#e0f2f1;color:#00695c;border-right-color:#26a69a}
td.memo-cell.schedule-cell{background:#e0f2f1;border-color:#80cbc4}
.schedule-inp.selected{background:#b2dfdb!important;outline:2px solid #26a69a;}
.schedule-display{font-size:11px;color:var(--text);line-height:1.5;padding:2px 3px;min-height:20px;word-break:break-all}
td.memo-hd.leave-hd{background:#e8f5e9;color:#2e7d32;border-right-color:#43a047}td.memo-hd.hw-hd{background:#e3f2fd;color:#1565c0;border-right-color:#1e88e5}
td.memo-hd.renraku-hd{background:#e8eaf6;color:#283593;border-right-color:#3949ab}
td.memo-hd.aim-hd{background:#fff8e1;color:#f57f17;border-right-color:#ffb300}
td.memo-hd.notice-hd{background:#fce4ec;color:#880e4f;border-right-color:#e91e63}
td.memo-hd.note-hd{background:#f3e5f5;color:#7b1fa2;border-right-color:#8e24aa}
td.memo-cell{border:1px solid #ffe082;background:#fffde7;padding:1px 3px;vertical-align:top}
td.memo-cell.leave-cell{background:#e8f5e9;border-color:#a5d6a7}
td.memo-cell.hw-cell{background:#e3f2fd;border-color:#90caf9}
td.memo-cell.renraku-cell{background:#e8eaf6;border-color:#9fa8da}
td.memo-cell.aim-cell{background:#fff8e1;border-color:#ffe082}
td.memo-cell.notice-cell{background:#fce4ec;border-color:#f48fb1}
td.memo-cell.note-cell{background:#f3e5f5;border-color:#ce93d8}
td.memo-cell textarea{width:100%;border:none;background:transparent;font-family:inherit;
  font-size:11px;resize:none;padding:1px 3px;outline:none;color:var(--text);
  min-height:20px;overflow:hidden}
/* 授業セル */
td.cell{border:1px solid var(--border);vertical-align:top;cursor:pointer;
  background:#fff;transition:background .1s;min-height:56px}
td.cell:hover{background:var(--blue-lt)}
td.cell.nocount{background:#fafafa;cursor:default}
td.cell.nocount:hover{background:#fafafa}
td.cell.inactive{background:#ebebeb!important;cursor:default!important;opacity:.6}
td.cell.inactive:hover{background:#ebebeb!important}
/* 交流児童チェックボックス（モーダル内）*/
.koury-modal-sec{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.koury-modal-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:5px;display:block}
.koury-checks{display:flex;flex-wrap:wrap;gap:5px}
.koury-check-item{display:flex;align-items:center;gap:3px;cursor:pointer;
  padding:2px 6px;border-radius:10px;border:1.5px solid;font-size:11px;font-weight:700;
  transition:all .12s;user-select:none}
.cin{display:flex;flex-direction:column;min-height:54px;padding:3px}
.srow{display:flex;align-items:flex-start;gap:2px}
.sname{font-size:20px;font-weight:700;line-height:1.3;flex:1}
.tbadge{font-size:9px;padding:0 3px;border-radius:8px;font-weight:700;flex-shrink:0;margin-top:1px}
.tb-f{background:#e3f2fd;color:var(--col-full)}
.tb-h{background:#fff3e0;color:var(--col-half)}
.tb-m{background:#f3e5f5;color:var(--col-mod)}
.csep{border-top:1px dashed #dde1e8;margin:2px 0}
.cmemo{font-size:10px;color:var(--muted);line-height:1.3;white-space:pre-line}
.cempty{color:#c8cdd6;font-size:11px;margin:auto;text-align:center}
.cbadges{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.cbadges-sub{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;padding-left:2px}
.kbadge{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
/* JISUU */
#jisuu{width:238px;flex-shrink:0;background:var(--card);border-left:2px solid var(--border);
  overflow-y:auto;padding:10px 10px 20px}
#jisuu h3{font-size:12px;color:var(--blue);font-weight:700;margin-bottom:8px;
  padding-bottom:4px;border-bottom:2px solid var(--blue-lt)}
.jtabs{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:7px}
.jtab{flex:1;padding:4px 0;text-align:center;font-size:10px;cursor:pointer;
  color:var(--muted);background:#fff;border:none;border-right:1px solid var(--border);font-family:inherit}
.jtab:last-child{border-right:none}
.jtab.on{background:var(--blue);color:#fff;font-weight:700}
/* 集計方法サブタブ */
.jsubtabs{display:flex;border:1px solid var(--border);border-radius:5px;
  overflow:hidden;margin:5px 0 6px}
.jsubtab{flex:1;padding:3px 0;text-align:center;font-size:10px;cursor:pointer;
  color:var(--muted);background:#fff;border:none;border-right:1px solid var(--border);
  font-family:inherit;transition:all .12s}
.jsubtab:last-child{border-right:none}
.jsubtab.on{background:#7b1fa2;color:#fff;font-weight:700}
.jleg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.jli{display:flex;align-items:center;gap:2px;font-size:9px;color:var(--muted)}
.jld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
table.jt{width:100%;border-collapse:collapse;font-size:10px}
table.jt thead th{background:#f0f4f9;color:var(--muted);padding:3px 2px;text-align:right;
  border-bottom:2px solid var(--border);font-size:9px;font-weight:700;white-space:nowrap}
table.jt thead th:first-child{text-align:left}
table.jt tbody td{padding:2px 2px;border-bottom:1px solid #f0f2f5;text-align:right}
table.jt tbody td:first-child{text-align:left;font-weight:600;font-size:11px}
table.jt .jf{color:var(--col-full)}
table.jt .jh{color:var(--col-half)}
table.jt .jm{color:var(--col-mod)}
table.jt .jt2{font-weight:700}
table.jt .jp{color:var(--col-plan)}
table.jt .jpos{color:var(--col-pos);font-weight:700}
table.jt .jneg{color:var(--col-neg);font-weight:700}
table.jt .jz{color:#dde1e8}
table.jt tfoot td{padding:3px 2px;font-weight:700;background:#f7f9fc;
  border-top:2px solid var(--border);text-align:right;font-size:11px}
table.jt tfoot td:first-child{text-align:left}
/* SUMMARY */
#sum-view{display:none;flex:1;overflow:auto;padding:14px}
#sum-view.on{display:block}
.scard{background:var(--card);border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);
  overflow:hidden;margin-bottom:20px}
.scardh{padding:10px 14px;font-size:13px;font-weight:700;border-bottom:2px solid var(--border)}
.scardh.s1{background:#e8f2fc;color:var(--sem1)}
.scardh.s2{background:#e8f5e9;color:var(--sem2)}
.scardh.s3{background:#f3e5f5;color:var(--sem3)}
.scardh.sy{background:#fff3e0;color:#bf360c}
.scardb{padding:10px 14px;overflow-x:auto}
table.stbl{border-collapse:collapse;font-size:11px;min-width:400px}
table.stbl th{background:#f5f7fa;color:var(--muted);padding:4px 7px;
  text-align:right;border:1px solid var(--border);font-size:10px;white-space:nowrap}
table.stbl th:first-child{text-align:left;min-width:80px}
table.stbl td{padding:3px 7px;border:1px solid #eef1f5;text-align:right}
table.stbl td:first-child{text-align:left;font-weight:600}
table.stbl .stot{font-weight:700;background:#f7f9fc;border-top:2px solid var(--border)}
table.stbl .sf{color:var(--col-full)}
table.stbl .sh{color:var(--col-half)}
table.stbl .sm{color:var(--col-mod)}
/* 実施率カラー */
.rate-red{color:#c62828!important;font-weight:700;background:#ffebee}
.rate-yellow{color:#e65100!important;font-weight:700;background:#fff8e1}
.rate-ok{color:#2e7d32}
/* 集計タブ（第3階層） */
#sum-stabs{display:flex;gap:4px;padding:10px 14px 0;border-bottom:1px solid var(--border);
  background:#f8f9fc;flex-shrink:0}
.sum-stab{padding:5px 14px;border-radius:5px 5px 0 0;cursor:pointer;font-size:12px;
  font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;
  background:#fff;font-family:inherit;margin-bottom:-1px;transition:all .12s}
.sum-stab.on{color:var(--blue);border-color:var(--border);background:var(--card)}
.sum-stab:hover:not(.on){color:var(--text);background:#f0f2f6}
/* 集計の左右分割 */
.sum-split{display:grid;grid-template-columns:1fr 1fr;gap:0;overflow-x:auto}
.sum-half{padding:10px 14px}
.sum-half-hd{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;
  padding-bottom:4px;border-bottom:1px solid var(--border)}
/* 時数パネル内の実施率テーブル */
.jrate-hd{font-size:10px;font-weight:700;color:#7b1fa2;margin:8px 0 4px;
  padding-top:6px;border-top:2px solid var(--blue-lt)}
table.jrt{width:100%;border-collapse:collapse;font-size:10px}
table.jrt thead th{background:#f3e5f5;color:#7b1fa2;padding:2px 2px;text-align:right;
  border-bottom:1px solid #ce93d8;font-size:9px;font-weight:700;white-space:nowrap}
table.jrt thead th:first-child{text-align:left}
table.jrt tbody td{padding:2px 2px;border-bottom:1px solid #f0f2f5;text-align:right;font-size:10px}
table.jrt tbody td:first-child{text-align:left;font-weight:600;font-size:11px}
/* 列コピー機能 */
#jbody table thead tr:last-child th.col-copyable{cursor:pointer;position:relative}
#jbody table thead tr:last-child th.col-copyable:hover{background:#d8c0f0;color:#4a148c}
#jbody table thead tr:last-child th.col-copied{background:#7b1fa2!important;color:#fff!important}
/* ─── リサイザー ──────────────────────────────────────────── */
#jisuu-resizer{width:5px;background:var(--border);cursor:col-resize;flex-shrink:0;
  transition:background .12s;position:relative}
#jisuu-resizer:hover,#jisuu-resizer.dragging{background:var(--blue)}
#jisuu-resizer::after{content:'⋮';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);color:var(--muted);font-size:12px;pointer-events:none}
/* ─── PRINT ─────────────────────────────────────────────── */
@media print{
  @page{size:A4 portrait;margin:8mm 8mm 8mm 8mm}
  body{overflow:visible!important;height:auto!important;font-size:9px;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  #hd,#sembar,#mbar,#wbar,#jisuu,#jisuu-resizer,#sum-view,#cfg-view,#modal-bg{display:none!important}
  #main{overflow:visible!important;display:block!important}
  #tt-wrap{display:block!important;overflow:visible!important;padding:0;width:100%}
  #print-hd{display:block!important}
  #print-summary{display:block!important}
  /* 印刷列非表示クラス（JSで付与）*/
  .print-hide-col{display:none!important}
  table#tt{width:100%!important;font-size:8px;table-layout:fixed}
  #tt th{background:#444!important;color:#fff!important;padding:2px 3px!important;
    font-size:8px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .th-sl{width:42px!important}
  .th-sat{background:#1565c0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .th-sun{background:#b71c1c!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.sltd{background:#f0f4f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;
    font-size:7px!important;padding:1px 2px!important;width:42px!important}
  td.sltd.asa{background:#e8f5e9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.sltd.gyo{background:#fff8e1!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.sltd.hiru{background:#fce4ec!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.sltd.owari{background:#e8eaf6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.cell{border:1px solid #ccc!important;padding:2px 3px!important;
    min-height:15mm!important;vertical-align:top;height:1px}
  td.cell.nocount{min-height:8mm!important}
  td.cell.inactive{display:none!important}
  .cin{min-height:inherit!important;padding:0!important}
  /* 教科名：教科色を維持しつつ印刷で確実に表示 */
  .sname{font-size:13px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* メモ・バッジ類は黒で統一 */
  .cmemo{font-size:7px!important;color:#333!important}
  .tbadge{font-size:6px!important;padding:0 2px!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd{font-size:7px!important;padding:1px 2px!important;color:#333!important}
  td.memo-cell{padding:1px 2px!important}
  td.memo-cell textarea{font-size:7px!important;color:#333!important;border:none!important;
    background:transparent!important;resize:none!important;height:auto!important;
    overflow:visible!important;min-height:10px!important}
  .kbadge{width:10px!important;height:10px!important;font-size:6px!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cbadges-sub{gap:1px!important;margin-top:1px!important}
  /* textarea→div変換後：黒で表示 */
  .print-ta-div{font-size:7px!important;white-space:pre-wrap;word-break:break-all;
    color:#333!important;padding:1px 2px;min-height:8px;line-height:1.3}
  .schedule-display{font-size:7px!important;color:#333!important;line-height:1.4!important;padding:1px 2px!important}
  td.memo-hd.schedule-hd,td.memo-cell.schedule-cell{background:#e0f2f1!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.leave-hd,td.memo-cell.leave-cell{background:#e8f5e9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.hw-hd,td.memo-cell.hw-cell{background:#e3f2fd!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.renraku-hd,td.memo-cell.renraku-cell{background:#e8eaf6!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.aim-hd,td.memo-cell.aim-cell{background:#fff8e1!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.notice-hd,td.memo-cell.notice-cell{background:#fce4ec!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.memo-hd.note-hd,td.memo-cell.note-cell{background:#f3e5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 集計3表 */
  #print-summary{margin-top:5mm;font-size:8px;page-break-inside:avoid}
  #print-summary .ps-title{font-weight:700;font-size:9px;margin:0 0 2px;color:#334}
  #print-summary table{border-collapse:collapse;font-size:7px;width:100%;margin:0}
  #print-summary th{background:#444!important;color:#fff!important;padding:2px 4px;border:1px solid #999;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;white-space:nowrap}
  #print-summary td{padding:2px 4px;border:1px solid #ccc;text-align:right;white-space:nowrap;color:#333!important}
  #print-summary td:first-child{text-align:left;font-weight:600}
  #print-summary .rate-red{color:#c62828!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #print-summary .rate-yellow{color:#e65100!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 3表を横並び、1ページに収まらない場合のみ改ページ */
  .ps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm;page-break-inside:avoid}
  .ps-row>div{break-inside:avoid}
  td.memo-hd.note-hd,td.memo-cell.note-cell{background:#f9f0ff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* メモ1〜5は空でも最低高さを確保して枠を表示 */
  td.memo-cell.note-cell .print-ta-div,
  td.memo-cell.note-cell textarea{min-height:14px!important}
  /* 配布用印刷モード：バッジ・集計表・校内メモのみ非表示 */
  body.print-student .cbadges-sub{display:none!important}
  body.print-student #print-summary{display:none!important}
  body.print-student .note-row{display:none!important}
  /* 配布用：時数バッジ非表示・教科名中央揃え・コマ高さ維持 */
  body.print-student .tbadge{display:none!important}
  body.print-student td.cell{min-height:18mm!important}
  body.print-student .cin{align-items:center!important}
  body.print-student .srow{justify-content:center!important}
  body.print-student .sname{text-align:center!important;font-size:17px!important}
}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:200;align-items:center;justify-content:center}
#modal-bg.on{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:460px;
  max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal.wide{width:660px}
.mtitle{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px}
.mnote{font-size:11px;color:var(--muted);background:#f8f9fc;padding:5px 9px;
  border-radius:4px;margin-bottom:10px;border-left:3px solid var(--blue)}
.m2cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mcollabel{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.mcl1{background:#e3f2fd;color:var(--col-full)}

.mf{margin-bottom:10px}

.chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;max-height:80px;overflow-y:auto}
.chip{padding:2px 7px;border-radius:10px;font-size:11px;cursor:pointer;

.chip.on{color:#fff!important;border-color:transparent!important}
.mf input[type=text],.mf textarea{width:100%;padding:5px 8px;border:1px solid var(--border);

.add2btn{width:100%;padding:6px;background:#f5f6f8;border:1.5px dashed var(--border);

.add2btn:hover{border-color:var(--col-half);color:var(--col-half);background:#fff3e0}
.del2btn{width:100%;padding:5px;background:#ffebee;border:1px solid #ffcdd2;

.mbtns{display:flex;gap:7px;margin-top:14px}
.mbtn{padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  font-family:inherit;border:1.5px solid;font-weight:600}
.mbok{background:var(--blue);border-color:var(--blue);color:#fff;flex:1}
.mbok:hover{background:#155fa0}
.mbdel{background:#ffebee;border-color:#ffcdd2;color:#c62828}
.mbdel:hover{background:#ffcdd2}
.mbcancel{background:#f5f6f8;border-color:var(--border);color:var(--muted)}
/* ─── 起動画面オーバーレイ ──────────────────────────────────── */
#startup-overlay{display:none;position:fixed;inset:0;z-index:300;
  background:linear-gradient(140deg,#1a4a8a 0%,#1a6fc4 100%);
  align-items:center;justify-content:center}
#startup-overlay.on{display:flex}
#startup-card{background:#fff;border-radius:16px;padding:44px 52px;

#startup-card h2{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:6px}
#startup-card .startup-sub{font-size:12px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.startup-btn{display:flex;align-items:center;gap:12px;width:100%;padding:15px 20px;
  border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  border:none;margin-bottom:12px;transition:all .15s;text-align:left}
.startup-btn:last-child{margin-bottom:0}

.startup-btn-text{display:flex;flex-direction:column;gap:2px}
.startup-btn-text small{font-size:10px;font-weight:400;opacity:.75}
.startup-btn-load{background:var(--blue);color:#fff}
.startup-btn-load:hover{background:#155fa0}
.startup-btn-new{background:#f0f4f9;color:var(--text);border:1.5px solid var(--border)}

/* ─── 必須項目セットアップモーダル ──────────────────────────── */
#setup-overlay{display:none;position:fixed;inset:0;z-index:310;
  background:rgba(0,0,0,.6);align-items:center;justify-content:center}
#setup-overlay.on{display:flex}
#setup-card{background:#fff;border-radius:16px;padding:36px 44px;

  max-height:88vh;overflow-y:auto}
#setup-card h2{font-size:17px;font-weight:700;color:var(--blue);margin-bottom:5px}
.setup-sub{font-size:12px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.setup-sec{margin-bottom:18px}
.setup-lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);

.setup-lbl small{font-size:10px;font-weight:400;color:#e65100;

.setup-mode-btns{display:flex;gap:8px;flex-wrap:wrap}
.setup-mode-btn{padding:8px 18px;border-radius:6px;border:2px solid var(--border);
  background:#fff;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .12s}
.setup-mode-btn.on{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
.setup-mode-btn:hover:not(.on){border-color:var(--blue);color:var(--blue)}
.setup-locked-val{font-size:13px;font-weight:700;color:var(--blue);

.setup-grade-row{display:flex;gap:10px;align-items:center}
.setup-sel{padding:7px 10px;border:1.5px solid var(--border);

.setup-inp{width:100%;padding:8px 12px;border:1.5px solid var(--border);
  border-radius:6px;font-size:13px;font-family:inherit;color:var(--text)}
.setup-inp:focus{outline:none;border-color:var(--blue)}
.setup-lock-note{font-size:11px;color:var(--muted);margin-top:8px;

#setup-ok{width:100%;padding:13px;background:#ccc;color:#fff;border:none;

  font-family:inherit;margin-top:8px;transition:background .2s}
#setup-ok.ready{background:var(--blue);cursor:pointer}
#setup-ok.ready:hover{background:#155fa0}

<body>
<div id="hd">
  <h1>📋 週案管理</h1>
  <span class="sep">|</span>
  <div class="hdf"><label>年度</label><select id="inp-year"></select></div>
  <div class="hdf"><label>表示名</label><input id="inp-class" placeholder="例：3年2組（印刷・ファイル名用）" maxlength="12"></div>
  <div class="hdf"><label>担任</label><input id="inp-teacher" placeholder="担任名を入力" maxlength="12"></div>
  <span class="sep" style="opacity:.25">|</span>
  <button class="hd-btn" id="btn-open-file">📂 週案データを開く</button>
  <button class="hd-btn accent" id="btn-save-file">💾 週案データを保存</button>
  <button class="hd-btn" id="btn-exit" style="border-color:rgba(255,255,255,.5)">✕ 終了</button>
  <span class="sep" style="opacity:.25">|</span>
  <div id="week-nav-btns" style="display:none;align-items:center;gap:4px">

    <button class="hd-btn accent" id="btn-today">今週</button>
    <button class="hd-btn" id="btn-next-week">翌週 ▶</button>
  </div>

  <span id="hd-saved">保存済み ✓</span>
  <span id="hd-source" style="font-size:10px;opacity:.65;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis" title=""></span>
  <span id="hd-json-status"></span>
  <span id="hd-today" style="margin-left:auto"></span>
</div>
<div id="mismatch-banner" style="display:none">
  <span id="mismatch-banner-msg"></span>
  <button class="mb-reload" id="mb-reload">最終保存ファイルを再読込</button>
  <button class="mb-continue" id="mb-continue">この状態で続ける</button>
</div>
<div id="setup-overlay">
  <div id="setup-card">
    <h2>📋 基本情報の設定</h2>

// 学年・学級タイプで教科が有効かどうか判定

}

}
// ③ 教科名ひらがな辞書（配布用印刷で使用）
const HIRA={

};

// ─── DEFAULTS ────────────────────────────────────────────────────
function defSubjects(){

  return defSubjectsForGrade(3,'normal');
}

}
function defPatterns(){return [{name:'',cells:{}},{name:'',cells:{}},{name:'',cells:{}},{name:'',cells:{}},{name:'',cells:{}}];}

// ─── STATE ───────────────────────────────────────────────────────
let S={year:curAcYear(),grade:3,classNum:1,gradeSet:false,cls:'',teacher:'',yearTotalWeeks:35,showSat:true,showSun:false,
       schedule:{},
       subjects:defSubjects(),slots:defSlots(),patterns:defPatterns(),koury:defKoury()};
let db={};
let fileHandle=null; // File System Access API ハンドル（セッション中のみ保持）
let appStarted=false; // 起動画面を抜けたらtrue
let hasUnsavedChanges=false; // 最後のファイル保存以降に変更があればtrue
let curView='sem',curSem='1',curMonth=4,curWeek=1,curCfgTab='slots',jisuuTab='week',jisuuSubTab='count',curSumTab='1';
// ─── 【1-1】モーダル状態を mstate に一元管理 ─────────────────────
let mstate={slotId:null,dk:null,m:null,w:null,
            s1:'',m1:'',s2:'',m2:'',has2:false,isMod:false,modN:3,isFull:false};
let printHira=false; // ③ 配布用ひらがな表示フラグ

function curAcYear(){const n=new Date();return n.getFullYear()-(n.getMonth()<3?1:0);}

// ─── STORAGE ─────────────────────────────────────────────────────
// ② 教科targetマイグレーション（学活→特活）
function migrateSubjectTargets(){
  S.subjects.forEach(s=>{if(s.label==='学活'&&s.target==='学活')s.target='特活';});
}
function migrateSlotLabels(){
  const map={asa:'朝モ',hiru:'昼モ',owari:'終モ'};
  const old={asa:'朝',hiru:'昼',owari:'終'};
  S.slots.forEach(sl=>{
    if(map[sl.id]&&sl.label===old[sl.id]) sl.label=map[sl.id];

// load() は廃止（STEP1-A）。データはJSONファイルからのみ読み込む。
function save(){
  if(appStarted) hasUnsavedChanges=true;
  showSavedIndicator();
  updateSaveStatus();
}

// ─── HELPERS ─────────────────────────────────────────────────────
function mYear(m){return m>=4?S.year:S.year+1;}
function mIdx(m){return MONTH_ORDER.indexOf(m);}
function yearWeekNum(m,w){return mIdx(m)*6+w;}
function sColor(lbl){
  if(SCOLORS[lbl]) return SCOLORS[lbl];
  let h=0;for(const c of lbl)h=(h<<5)-h+c.charCodeAt(0);
  return `hsl(${Math.abs(h)%360},58%,40%)`;
}
function getCell(m,w,sid,dk){
  const y=mYear(m);
  return db[y]?.[m]?.[w]?.[sid]?.[dk]||{s1:'',m1:'',s2:'',m2:''};
}
function setCell(m,w,sid,dk,v){
  const y=mYear(m);
  if(!db[y])db[y]={};if(!db[y][m])db[y][m]={};
  if(!db[y][m][w])db[y][m][w]={};if(!db[y][m][w][sid])db[y][m][w][sid]={};
  db[y][m][w][sid][dk]=v;save();
}
function getWDate(m,w){const y=mYear(m);return db[y]?.[m]?.[w]?._date||'';}
function setWDate(m,w,v){
  const y=mYear(m);if(!db[y])db[y]={};if(!db[y][m])db[y][m]={};
  if(!db[y][m][w])db[y][m][w]={};db[y][m][w]._date=v;save();
}

// ─── 【1-3/1-4】週メモ管理 ────────────────────────────────────────
// メモ行日別化：asa/gyoukan/lunch/leave/hw は曜日ごとのオブジェクト
// notes（週メモ1〜5）は週単位の配列のまま維持
function defDayObj(){return {sun:'',mon:'',tue:'',wed:'',thu:'',fri:'',sat:''};}
function defWeekMemos(){return {asa:defDayObj(),gyoukan:defDayObj(),lunch:defDayObj(),leave:defDayObj(),hw:defDayObj(),renraku:defDayObj(),weekly_aim:'',notice:'',notes:['','','','','']};}
function getWeekMemos(m,w){
  const y=mYear(m);
  const raw=db[y]?.[m]?.[w]?._memos;
  if(!raw) return defWeekMemos();
  function toDayObj(v){
    if(!v) return defDayObj();
    if(typeof v==='string'){return {sun:'',mon:v,tue:'',wed:'',thu:'',fri:'',sat:''};}
    const base=defDayObj();Object.keys(base).forEach(dk=>{base[dk]=v[dk]||'';});return base;
  }
  return {asa:toDayObj(raw.asa),gyoukan:toDayObj(raw.gyoukan),lunch:toDayObj(raw.lunch),
          leave:toDayObj(raw.leave),hw:toDayObj(raw.hw),renraku:toDayObj(raw.renraku),
          weekly_aim:raw.weekly_aim||'',notice:raw.notice||'',
          notes:raw.notes||['','','','','']};
}
function setWeekMemo(m,w,key,val,dk){
  const y=mYear(m);
  if(!db[y])db[y]={};if(!db[y][m])db[y][m]={};if(!db[y][m][w])db[y][m][w]={};
  if(!db[y][m][w]._memos)db[y][m][w]._memos=defWeekMemos();
  if(key.startsWith('note_')){
    const idx=+key.split('_')[1];
    db[y][m][w]._memos.notes[idx]=val;
  } else if(key==='weekly_aim'||key==='notice'){
    // 週単位フィールド（日別でない）
    db[y][m][w]._memos[key]=val;
  } else if(dk){
    // 日別メモ：旧string形式からのマイグレーションも考慮
    const cur=db[y][m][w]._memos[key];
    if(!cur||typeof cur==='string'){
      db[y][m][w]._memos[key]={sun:'',mon:typeof cur==='string'?cur:'',tue:'',wed:'',thu:'',fri:'',sat:''};
    }
    db[y][m][w]._memos[key][dk]=val;
  } else {
    db[y][m][w]._memos[key]=val;
  }
  save();
}

function visSlots(){
  return S.slots.filter(sl=>{
    if(sl.base==='full'||sl.base==='none') return true;
    return sl.base==='mod'&&sl.active;
  });
}
function slotVal(sl,has2){
  if(sl.base==='none') return 0;
  if(sl.base==='mod') return 1/(sl.modN||3);
  return has2?0.5:1;
}
// ④ モジュールスロットが1つでも有効か
function hasActiveMod(){return S.slots.some(sl=>sl.base==='mod'&&sl.active);}

function targets(){
  const seen=new Set(),res=[];
  for(const s of S.subjects){if(!seen.has(s.target)){seen.add(s.target);res.push(s.target);}}
  return res;
}
function toTarget(lbl){const s=S.subjects.find(x=>x.label===lbl);return s?s.target:lbl;}
function planForTarget(t){
  return S.subjects.filter(s=>s.target===t).reduce((a,s)=>({
    planStd:  a.planStd  +(+s.planStd ||0),
    planTotal:a.planTotal+(+s.planTotal||0),
    // ⑤ planFullは自動計算（配当時数 - モジュール）
    planFull: a.planFull +Math.max(0,(+s.planTotal||0)-(+s.planMod||0)),
    planMod:  a.planMod  +(+s.planMod  ||0)
  }),{planStd:0,planTotal:0,planFull:0,planMod:0});
}
function fmtN(n){if(!n)return'';const r=Math.round(n*100)/100;return r%1===0?String(r):r.toFixed(2);}
function fmtNz(n){const r=Math.round(n*100)/100;return r%1===0?String(r):r.toFixed(2);}
function fmtDiff(n){if(Math.abs(n)<0.01)return'±0';const a=Math.round(Math.abs(n)*100)/100;const s=a%1===0?String(a):a.toFixed(2);return(n>0?'+':'-')+s;}

// ─── 【2-2】有効週の判定 ─────────────────────────────────────────
// 週（日〜土スパン）とその月が1日以上重なれば有効
// ※月またぎ週は両月で有効になる。セル側で当該月外の日付を非アクティブ化して対応。
function isValidWeek(year,month,week){
  const monday=calcMonday(year,month,week);
  const sunday=new Date(monday);sunday.setDate(sunday.getDate()-1); // 週頭の日曜
  const saturday=new Date(monday);saturday.setDate(saturday.getDate()+5); // 週末の土曜
  const y=month>=4?year:year+1;
  const mStart=new Date(y,month-1,1);
  const mEnd=new Date(y,month,0);
  return sunday<=mEnd && saturday>=mStart;
}
// セルの日付がその月に属するか（月またぎ週の非アクティブ判定用）
function dateInMonth(dateStr,month){
  if(!dateStr) return true; // 日付不明時はアクティブとして扱う
  const d=new Date(dateStr);
  return d.getMonth()+1===month;
}
function validWeeksForMonth(month){
  const ws=[];
  for(let w=1;w<=6;w++) if(isValidWeek(S.year,month,w)) ws.push(w);
  return ws;
}

// ─── 【2-3/2-4】JSONファイル保存・読み込み ─────────────────────
function makeJsonData(){
  const sourceName=fileHandle?fileHandle.name:null;
  return JSON.stringify({version:'v4.1',sourceName,cfg:S,db},null,2);
}
function makeFileName(){
  const cls=S.cls||'クラス未設定';
  return `${S.year}年度_${cls}_週案データ.json`;
}
// 常にエクスプローラを開いて保存（前回フォルダを記憶・初回はマイドキュメント）
// 保存処理の共通ロジック（エラーをそのまま投げる）
async function _doSaveToFile(){
  const json=makeJsonData();
  const blob=new Blob([json],{type:'application/json'});
  if(window.showSaveFilePicker){
    const opts={
      suggestedName:makeFileName(),
      types:[{description:'週案データ',accept:{'application/json':['.json']}}]
    };
    opts.startIn=fileHandle||'documents';
    fileHandle=await window.showSaveFilePicker(opts); // 失敗・AbortErrorはそのまま投げる
    const writable=await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
    hasUnsavedChanges=false;
    updateSourceNameDisplay();
    showSavedIndicator('💾 保存完了');
    updateSaveStatus();
  } else {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=makeFileName();a.click();
    URL.revokeObjectURL(url);
    hasUnsavedChanges=false;
    showSavedIndicator('💾 ダウンロード完了');
    updateSaveStatus();
  }
}
async function saveToFile(){
  try{
    await _doSaveToFile();
  }catch(e){
    if(e.name!=='AbortError') alert('保存に失敗しました：'+e.message);
  }
}
async function saveAsNewFile(){
  await saveToFile(); // saveToFileが常にピッカーを開くので同じ動作
}
// 必須項目設定後：保存→読み戻し
async function saveAndReload(){
  await saveToFile();
  // 保存成功後（fileHandleあり）に読み戻してアプリ状態をJSONと完全一致させる
  if(fileHandle){
    try{
      const file=await fileHandle.getFile();
      const text=await file.text();
      applyJsonData(text,fileHandle);
    }catch(e){}
  }
}
async function loadFromFile(){
  if(window.showOpenFilePicker){
    try{
      const opts={types:[{description:'週案データ',accept:{'application/json':['.json']}}]};
      if(fileHandle) opts.startIn=fileHandle; // 前回と同じフォルダを最初に表示
      const [fh]=await window.showOpenFilePicker(opts);
      const file=await fh.getFile();
      const text=await file.text();
      applyJsonData(text,fh);
    }catch(e){
      if(e.name!=='AbortError') alert('ファイルを開けませんでした：'+e.message);
    }
  } else {
    const inp=document.createElement('input');
    inp.type='file';inp.accept='.json';
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;
      const text=await file.text();
      applyJsonData(text,null);
    };
    inp.click();
  }
}
function applyJsonData(text,fh){
  try{
    const parsed=JSON.parse(text);
    if(!parsed.cfg||!parsed.db) throw new Error('形式が正しくありません');
    // フィールドを先にリセットしてからJSONを適用
    S.grade=3; S.classNum=1; S.gradeSet=false;
    const hadGrade=parsed.cfg.grade!=null;
    const keys=['year','grade','classNum','gradeSet','cls','teacher','yearTotalWeeks','showSat','showSun','schedule','subjects','slots','patterns','koury'];
    keys.forEach(k=>{if(parsed.cfg[k]!=null)S[k]=parsed.cfg[k];});
    if(!hadGrade) S.gradeSet=false; // 旧v4 JSONはgradeなし → 未設定確定
    S.subjects.forEach(s=>{if(s.planStd==null)s.planStd=0;});
    migrateSlotLabels();
    migrateSubjectTargets();
    if(S.grade==null) S.grade=3;
    if(S.classNum==null) S.classNum=1;
    if(S.gradeSet==null) S.gradeSet=false;
    S.koury.children.forEach(ch=>{
      if(ch.tenshutsu==null) ch.tenshutsu=false;
      if(ch.grade===undefined) ch.grade=null;
      if(ch.classNum===undefined) ch.classNum=null;
    });
    db=parsed.db;
    fileHandle=fh; // 開いたファイルを保存先として保持

// 月曜日付の計算（日曜アンカー方式）
// 「その月の1日を含む週の日曜日」を第1週の起点とし、
// 第N週の月曜 = 起点日曜 + (N-1)*7 + 1
// タイムゾーンバグ対策：toISOString()はUTC変換でJST環境では前日になるため
// ローカル日時でYYYY-MM-DD文字列を生成する
function localDateStr(d){
  return d.getFullYear()+'-'+
    String(d.getMonth()+1).padStart(2,'0')+'-'+
    String(d.getDate()).padStart(2,'0');
}

function calcMonday(year,month,week){
  const y=month>=4?year:year+1;
  const firstDay=new Date(y,month-1,1);
  const dow=firstDay.getDay(); // 0=日,1=月,...,6=土
  // その月の1日を含む週の日曜日（dow=0なら1日自身）
  const firstSunday=new Date(y,month-1,1-dow);
  // 第N週の月曜 = firstSunday + (N-1)*7 + 1日
  const result=new Date(firstSunday);
  result.setDate(firstSunday.getDate()+(week-1)*7+1);
  return result;
}
function getEffectiveMonday(m,w){
  const stored=getWDate(m,w);
  if(stored) return stored;
  return localDateStr(calcMonday(S.year,m,w));
}

// ─── JISUU CALC ──────────────────────────────────────────────────
function calcActual(pairs){
  const ts=targets();
  const res={};ts.forEach(t=>res[t]={full:0,half:0,mod:0,tot:0});
  for(const{m,weeks}of pairs){
    for(const w of weeks){
      for(const sl of S.slots){
        if(sl.base==='none') continue;
        const isMod=sl.base==='mod';
        const unitMod=1/(sl.modN||3);
        for(const dk of DKEYS){
          const c=getCell(m,w,sl.id,dk);
          const has2=!!c.s2;
          const r1=has2?(c.ratio1??0.5):1; // 教科1の比率（デフォルト0.5）
          const r2=has2?Math.round((1-r1)*100)/100:0;
          if(c.s1){
            const t=toTarget(c.s1);if(!res[t])res[t]={full:0,half:0,mod:0,tot:0};
            if(isMod){res[t].mod+=1;res[t].tot+=unitMod;}
            else if(has2){res[t].half+=1;res[t].tot+=r1;}
            else{res[t].full+=1;res[t].tot+=1;}
          }
          if(c.s2&&!isMod){
            const t=toTarget(c.s2);if(!res[t])res[t]={full:0,half:0,mod:0,tot:0};
            res[t].half+=1;res[t].tot+=r2;
          }
        }
      }
    }
  }
  return res;
}
function calcWeek(m,w){return calcActual([{m,weeks:[w]}]);}
function calcMonth(m){return calcActual([{m,weeks:[1,2,3,4,5,6]}]);}
function calcSem(sem){return calcActual(SEMS[sem].months.map(m=>({m,weeks:[1,2,3,4,5,6]})));}
function calcYear(){return calcActual(['1','2','3'].flatMap(s=>SEMS[s].months.map(m=>({m,weeks:[1,2,3,4,5,6]}))));}
function calcCumulative(){
  const upTo=yearWeekNum(curMonth,curWeek);
  const pairs=[];
  for(const m of MONTH_ORDER){
    const mi=mIdx(m);
    for(let w=1;w<=6;w++){
      if(mi*6+w<=upTo) pairs.push({m,weeks:[w]});
    }
  }
  return calcActual(pairs);
}
function calcCumMonth(){
  const ws=[];for(let w=1;w<=curWeek;w++)ws.push(w);
  return calcActual([{m:curMonth,weeks:ws}]);
}
function calcCumSem(){
  const sms=SEMS[curSem].months;
  const ci=sms.indexOf(curMonth);
  const pairs=sms.map((m,i)=>{
    if(i<ci)return{m,weeks:[1,2,3,4,5,6]};
    if(i===ci){const ws=[];for(let w=1;w<=curWeek;w++)ws.push(w);return{m,weeks:ws};}
    return null;
  }).filter(Boolean);
  return calcActual(pairs);
}

// ─── 【3-1/3-2】実施率計算ヘルパー ──────────────────────────────
// 指定月リストの有効週合計数
function validWeekCountForMonths(months){
  return months.reduce((s,m)=>s+validWeeksForMonth(m).length,0);
}
// 実施率(%) = 実績 / (計画 × 経過週 / 総週) × 100 ── 実数のまま返す
function calcRate(actual,plan,periodWeeks,totalWeeks){
  if(!plan||!periodWeeks||!totalWeeks) return null;
  const expected=plan*(periodWeeks/totalWeeks);
  if(expected<=0) return null;
  return actual/expected*100; // ★ Math.round しない。表示時のみ丸める
}
function fmtRate(r){
  if(r===null||r===undefined) return '-';
  return r.toFixed(1)+'%'; // 表示上のみ小数1位
}
function rateCls(r){
  if(r===null||r===undefined) return '';
  if(r<90) return 'rate-red';
  if(r<100) return 'rate-yellow';
  return 'rate-ok';
}

      <td><input type="number" class="sj-pt" value="${s.planTotal||0}" min="0" style="width:50px"></td>

        ${i>0?`<button class="rbtn rbtn-up" data-i="${i}">↑</button>`:'<span style="display:inline-block;width:24px"></span>'}

      </td>
      <td><button class="rbtn rbtn-del" data-i="${i}">削除</button></td>
    </tr>`;
  });
  tb.innerHTML=rows;

  // ─ キーボードナビゲーション ─
  const COL_SELECTORS=hasMod?['sj-lbl','sj-ps','sj-pt','sj-pm']:['sj-lbl','sj-ps','sj-pt'];
  const grid=[];
  tb.querySelectorAll('tr').forEach(tr=>{
    const rowInputs=COL_SELECTORS.map(cls=>tr.querySelector('.'+cls)).filter(Boolean);
    grid.push(rowInputs);
  });
  grid.forEach((rowInputs,ri)=>{
    rowInputs.forEach((inp,ci)=>{
      inp.addEventListener('keydown',e=>{
        let targetR=ri,targetC=ci;
        if(e.key==='Enter'||e.key==='ArrowDown'){targetR=ri+1;}
        else if(e.key==='ArrowUp'){targetR=ri-1;}
        else if(e.key==='ArrowRight'&&e.target.selectionStart===e.target.value.length){targetC=ci+1;}
        else if(e.key==='ArrowLeft'&&e.target.selectionStart===0){targetC=ci-1;}
        else return;
        if(targetC<0){targetR--;targetC=rowInputs.length-1;}
        if(targetC>=rowInputs.length){targetR++;targetC=0;}
        if(targetR<0||targetR>=grid.length) return;
        const dest=grid[targetR]?.[targetC];
        if(!dest) return;
        e.preventDefault();
        dest.focus();
        if(dest.type==='number'||dest.type==='text') dest.select();
      });
    });
  });

  tb.querySelectorAll('tr').forEach((tr,i)=>{
    const lbl=tr.querySelector('.sj-lbl'),tgt=tr.querySelector('.sj-tgt'),tnew=tr.querySelector('.sj-tnew');

      // 入力中は一時保持のみ（確定はonblurで行う）
    };
    lbl.onblur=()=>{
      const newLabel=lbl.value.trim();
      const oldLabel=S.subjects[i].label;
      if(!newLabel||newLabel===oldLabel){
        lbl.value=oldLabel; // 空や未変更はリセット
        renderSubjTable();
        return;
      }
      // dbに旧表示名が存在するか検索（旧ラベルが空の場合はスキップ）
      const used=oldLabel?_labelUsedInDb(oldLabel):false;
      if(used){
        const ok=confirm(
          `「${oldLabel}」は既に週案データに入力されています。\n`+
          `週案データ内の「${oldLabel}」を「${newLabel}」に置き換えますか？\n\n`+
          `※「キャンセル」を押すと表示名を元に戻します。`
        );
        if(!ok){
          lbl.value=oldLabel;
          renderSubjTable();
          return;
        }
        _replaceSubjectLabelInDb(oldLabel,newLabel);
      }
      S.subjects[i].label=newLabel;
      if(S.koury.mode==='senka') S.subjects[i].target=newLabel;
      save();
      checkSubjectMismatch();
      renderSubjTable();
    };
    tgt.onchange=()=>{
      if(tgt.value==='__new__'){tnew.style.display='block';tnew.focus();}
      else{tnew.style.display='none';S.subjects[i].target=tgt.value;save();}
    };
    tnew.oninput=()=>{S.subjects[i].target=tnew.value;save();};
    tnew.onblur=()=>{if(tnew.value.trim()) renderSubjTable();};
    ps.oninput=()=>{S.subjects[i].planStd=+ps.value||0;save();};
    pt.oninput=()=>{
      S.subjects[i].planTotal=+pt.value||0;
      S.subjects[i].planFull=Math.max(0,S.subjects[i].planTotal-S.subjects[i].planMod);
      if(pfDisp) pfDisp.value=S.subjects[i].planFull;
      save();
    };
    if(pm){
      pm.oninput=()=>{
        S.subjects[i].planMod=+pm.value||0;
        S.subjects[i].planFull=Math.max(0,S.subjects[i].planTotal-S.subjects[i].planMod);
        if(pfDisp) pfDisp.value=S.subjects[i].planFull;
        save();
      };
    }
    tr.querySelector('.rbtn-up')?.addEventListener('click',()=>{const t=S.subjects[i];S.subjects[i]=S.subjects[i-1];S.subjects[i-1]=t;save();renderSubjTable();});
    tr.querySelector('.rbtn-dn')?.addEventListener('click',()=>{const t=S.subjects[i];S.subjects[i]=S.subjects[i+1];S.subjects[i+1]=t;save();renderSubjTable();});
    tr.querySelector('.rbtn-del')?.addEventListener('click',()=>{
      const label=S.subjects[i].label;
      const count=label?_countSubjectInDb(label):0;
      if(count>0){
        const ok=confirm(
          `「${label}」は週案データに ${count} コマ入力されています。\n`+
          `教科リストから削除すると同時に、週案データからも削除します。\n\n`+
          `・1教科コマ → セルがクリアされます\n`+
          `・2教科コマの片方 → 残った教科の1コマとして引き継がれます\n\n`+
          `削除しますか？`
        );
        if(!ok) return;
        _removeSubjectFromDb(label);
      }
      S.subjects.splice(i,1);
      save();
      checkSubjectMismatch();
      renderSubjTable();
    });
  });
}

// 教科表示名がdbに存在するか判定
function _labelUsedInDb(label){
  for(const y of Object.values(db)){
    for(const m of Object.values(y)){
      for(const w of Object.values(m)){
        for(const[key,dayMap]of Object.entries(w)){
          if(key.startsWith('_')) continue;
          for(const c of Object.values(dayMap)){
            if(c.s1===label||c.s2===label) return true;
          }
        }
      }
    }
  }
  return false;
}
// db内の教科表示名を一括置換（s1・s2両方）
function _replaceSubjectLabelInDb(oldLabel,newLabel){
  for(const y of Object.values(db)){
    for(const m of Object.values(y)){
      for(const w of Object.values(m)){
        for(const[key,dayMap]of Object.entries(w)){
          if(key.startsWith('_')) continue;
          for(const c of Object.values(dayMap)){
            if(c.s1===oldLabel) c.s1=newLabel;
            if(c.s2===oldLabel) c.s2=newLabel;
          }
        }
      }
    }
  }
}
// db内で教科表示名が使われているコマ数を返す
function _countSubjectInDb(label){
  let count=0;
  for(const y of Object.values(db)){
    for(const m of Object.values(y)){
      for(const w of Object.values(m)){
        for(const[key,dayMap]of Object.entries(w)){
          if(key.startsWith('_')) continue;
          for(const c of Object.values(dayMap)){
            if(c.s1===label||c.s2===label) count++;
          }
        }
      }
    }
  }
  return count;
}
// db内から教科表示名を削除（3パターン対応）
function _removeSubjectFromDb(label){
  for(const y of Object.values(db)){
    for(const m of Object.values(y)){
      for(const w of Object.values(m)){
        for(const[key,dayMap]of Object.entries(w)){
          if(key.startsWith('_')) continue;
          for(const c of Object.values(dayMap)){
            if(c.s1===label&&!c.s2){
              // パターン①：1教科コマ → セルを丸ごとクリア
              c.s1='';c.m1='';c.ratio1=null;c.koury1=null;
            } else if(c.s2===label){
              // パターン②：s2が削除対象 → s2のみクリア
              c.s2='';c.m2='';c.ratio1=null;c.koury2=null;
            } else if(c.s1===label&&c.s2){
              // パターン③：s1が削除対象・s2あり → s2をs1に繰り上げ
              c.s1=c.s2;c.m1=c.m2;c.koury1=c.koury2;
              c.s2='';c.m2='';c.ratio1=null;c.koury2=null;
            }
          }
        }
      }
    }
  }
}
// ─── 専科モード：ラベルバリデーション・パース ─────────────────────
// 有効な専科ラベル：「X年Y組教科名」または特別キーワード
const SENKA_SPECIAL=['研修','授業準備'];
function _isSenkaLabelValid(label){
  if(!label) return false;
  if(SENKA_SPECIAL.includes(label)) return true;
  return /^.+組.+$/.test(label); // 組の前に何か、後に教科名
}
// 「3年1組国語」「A組体育」→ {gakuban:'3年1組', kyoka:'国語'}
// 「研修」→ {gakuban:'', kyoka:'研修'}
function _parseSenkaLabel(label){
  const m=label.match(/^(.+組)(.+)$/);
  if(m) return{gakuban:m[1],kyoka:m[2]};
  return{gakuban:'',kyoka:label};
}
// 月のある日付(day)から (week, dk) を返す
function _findWeekDkForDay(month,day){
  const year=month>=4?S.year:S.year+1;
  const dt=new Date(year,month-1,day);
  const dk=DKEYS[dt.getDay()];
  const iso=localDateStr(dt);
  const loc=findCellLocationForDate(iso,dk);
  return loc?{week:loc.week,dk}:null;
}

// 行事予定の月別印刷（ページ内に一時的に追加してprint()、タブ増加なし）
function printSchedule(m){
  const y=m>=4?S.year:S.year+1;
  const daysInMonth=new Date(y,m,0).getDate();
  const DAY_JP=['日','月','火','水','木','金','土'];
  const WAREKI=S.year-2018;
  const warekiStr=WAREKI===1?'元':String(WAREKI);

  let rows='';
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m-1,d);
    const iso=localDateStr(dt);
    const dow=dt.getDay();
    const val=S.schedule[iso]||'';
    const isSat=dow===6,isSun=dow===0;
    const dowColor=isSun?'color:#c62828':isSat?'color:#1565c0':'';
    const rowBg=val?'':(isSun?'background:#fff5f5':isSat?'background:#f5f9ff':'background:#fafafa');
    rows+=`<tr style="${rowBg}">
      <td style="${dowColor}">${m}/${d}</td>
      <td style="text-align:center;${dowColor}">${DAY_JP[dow]}</td>
      <td style="white-space:pre-wrap">${escHtml(val)||''}</td>
    </tr>`;
  }

  // 一時的な印刷用div をbodyに追加
  const printDiv=document.createElement('div');
  printDiv.id='schedule-print-area';
  printDiv.innerHTML=`
    <h2 style="font-size:13px;margin:0 0 8px;padding-bottom:4px;border-bottom:2px solid #546e7a;color:#37474f">
      令和${warekiStr}年度（${S.year}年度）　${m}月　行事予定　${escHtml(S.cls||'')}
    </h2>
    <table style="width:100%;border-collapse:collapse;font-size:10px">

function renderScheduleTable(){  const tbody=document.getElementById('schedule-body');
  if(!tbody)return;
  const m=scheduleMonth;
  const y=m>=4?S.year:S.year+1;
  const daysInMonth=new Date(y,m,0).getDate();
  const DAY_JP=['日','月','火','水','木','金','土'];
  let rows='';
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m-1,d);
    const iso=localDateStr(dt);
    const dow=dt.getDay();
    const val=S.schedule[iso]||'';
    const dowColor=dow===0?'color:#b71c1c':dow===6?'color:#1565c0':'';
    rows+=`<tr>
      <td style="white-space:nowrap;font-size:12px">${m}/${d}</td>
      <td style="text-align:center;font-size:12px;${dowColor}">${DAY_JP[dow]}</td>
      <td>
        <input type="text" class="schedule-inp" data-iso="${iso}"
          value="${escHtml(val)}"
          style="width:100%;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit">
      </td>
    </tr>`;
  }
  tbody.innerHTML=rows;

  // 各行のinputイベント
  // ① ↑↓キーで前後の行に移動　② Shift+↑↓で範囲選択　Delete/Backspaceで一括クリア
  let anchorIdx=-1; // 範囲選択の起点
  const allInputs=[...tbody.querySelectorAll('.schedule-inp')];

  function clearSelection(){
    allInputs.forEach(i=>i.style.background='');
    anchorIdx=-1;
  }
  function applySelection(from,to){
    allInputs.forEach((i,idx)=>{
      i.style.background=(idx>=from&&idx<=to)?'#b2dfdb':'';
    });
  }

  allInputs.forEach((inp,idx)=>{
    inp.addEventListener('input',()=>{
      S.schedule[inp.dataset.iso]=inp.value;
      save();
      renderTT();
    });

    inp.addEventListener('keydown',e=>{
      // ↑↓：フォーカス移動（選択クリア）
      if((e.key==='ArrowUp'||e.key==='ArrowDown')&&!e.shiftKey){
        e.preventDefault();
        clearSelection();
        const next=e.key==='ArrowUp'?allInputs[idx-1]:allInputs[idx+1];
        if(next){next.focus();next.select();}
        return;
      }
      // Shift+↑↓：範囲選択
      if((e.key==='ArrowUp'||e.key==='ArrowDown')&&e.shiftKey){
        e.preventDefault();
        if(anchorIdx===-1) anchorIdx=idx;
        const curSel=allInputs.findIndex(i=>i.style.background==='rgb(178, 223, 219)');
        const nextFocus=e.key==='ArrowUp'?Math.max(0,idx-1):Math.min(allInputs.length-1,idx+1);
        allInputs[nextFocus].focus();
        const from=Math.min(anchorIdx,nextFocus);
        const to=Math.max(anchorIdx,nextFocus);
        applySelection(from,to);
        return;
      }
      // Delete/Backspace：選択中行を一括クリア
      if(e.key==='Delete'||e.key==='Backspace'){
        const selected=allInputs.filter(i=>i.style.background==='rgb(178, 223, 219)');
        if(selected.length>1){
          e.preventDefault();
          selected.forEach(i=>{i.value='';S.schedule[i.dataset.iso]='';});
          clearSelection();
          save();
          renderTT();
          return;
        }
      }
      // Escape：選択クリア
      if(e.key==='Escape'){clearSelection();}
    });

    inp.addEventListener('focus',()=>{
      // フォーカス時（Shiftなし）は選択クリア
      if(!window._scheduleShiftDown) clearSelection();
    });

    // Ctrl+Vペースト対応（複数行）
    inp.addEventListener('paste',e=>{
      e.preventDefault();
      const text=e.clipboardData.getData('text');
      // \r\n（Excel行区切り）だけで分割、セル内\nはnormalizeで全角スペースに変換
      const lines=text.split(/\r\n|\r/).map(l=>normalizeScheduleText(l)).filter(l=>l!=='');
      if(lines.length<=1){
        const norm=normalizeScheduleText(text);
        const cur=inp.value;
        const start=inp.selectionStart,end=inp.selectionEnd;
        inp.value=cur.slice(0,start)+norm+cur.slice(end);
        S.schedule[inp.dataset.iso]=inp.value;
        save();
        renderTT();
        return;
      }
      lines.forEach((line,i)=>{
        const target=allInputs[idx+i];
        if(!target) return;
        target.value=line;
        S.schedule[target.dataset.iso]=line;
      });
      save();
      renderTT();
    });
  });

}

// ICSパース・インポート（ical.js使用）
function importICS(icsText){
  if(typeof ICAL==='undefined'){alert('ical.jsが読み込まれていません。');return;}
  let count=0;
  try{
    const jcal=ICAL.parse(icsText);
    const comp=new ICAL.Component(jcal);
    const vevents=comp.getAllSubcomponents('vevent');
    vevents.forEach(vevent=>{
      const ev=new ICAL.Event(vevent);
      const title=ev.summary||'';
      if(!title) return;
      // 繰り返しイベントの展開
      if(ev.isRecurring()){
        const y1=S.year,y2=S.year+1;
        const start=ICAL.Time.fromDateString(`${y1}-04-01`);
        const end=ICAL.Time.fromDateString(`${y2}-03-31`);
        const iter=ev.iterator();
        let next;
        while((next=iter.next())){
          if(next.compare(end)>0) break;
          if(next.compare(start)<0) continue;
          const iso=next.toString().slice(0,10);
          appendSchedule(iso,title);
          count++;
        }
      } else {
        const dtstart=ev.startDate;
        const iso=dtstart.toString().slice(0,10);
        appendSchedule(iso,title);
        count++;
      }
    });
    save();
    renderScheduleTable();
    renderTT();
    alert(`${count}件のイベントを追記しました。`);
  }catch(e){
    alert('ICSファイルの読み込みに失敗しました：'+e.message);
  }
}

// 行事テキスト正規化：全角・半角スペース・改行を全角スペース1つに統一
function normalizeScheduleText(text){
  let t=text.trim();
  // Excelが付与する囲みダブルクォートを除去（先頭・末尾が"の場合）
  if(t.startsWith('"')&&t.endsWith('"')) t=t.slice(1,-1);
  // Excelの""エスケープ → " に戻す
  t=t.replace(/""/g,'"');
  return t
    .replace(/[\u3000 \t\n\r]+/g,'\u3000') // 全角・半角スペース・改行 → 全角スペース1つ
    .replace(/^\u3000|\u3000$/g,'');        // 前後の全角スペースをトリム
}

// 行事を追記（既存があれば全角スペースで連結）
function appendSchedule(iso,title){
  const norm=normalizeScheduleText(title);
  if(!norm) return;
  const cur=S.schedule[iso]||'';
  if(cur){
    // 既に同じタイトルがあればスキップ
    if(cur.split('\u3000').includes(norm)) return;
    S.schedule[iso]=cur+'\u3000'+norm;
  } else {
    S.schedule[iso]=norm;
  }
}

// ─── KOURY BADGES ────────────────────────────────────────────────
// デフォルト計算：転出児童は除外（新規コマには自動で立たない）
function kBadgesDefault(subjSet){
  if(!subjSet.size) return new Set();
  const mode=S.koury.mode;
  const shown=new Set();
  for(const ch of S.koury.children){
    if(!ch.active||ch.tenshutsu) continue;
    let show=false;
    // 通常学級・専科：交流教科に一致する児童を表示
    if(mode==='normal'||mode==='senka'){
      for(const s of subjSet){if(ch.subjects.includes(s)){show=true;break;}}
    } else {
      // 特別支援学級：交流に行かない（在籍中の）コマで表示
      let inEx=false;for(const s of subjSet){if(ch.subjects.includes(s)){inEx=true;break;}}show=!inEx;
    }
    if(show) shown.add(ch.id);
  }
  return shown;
}
// コマ単位の上書きを反映したバッジ一覧
// 転出児童：明示的にtrue保存されている過去データのみ表示、デフォルトでは立てない
function kBadgesForCell(s1, s2, koury1, koury2){
  const activeChildren=S.koury.children.filter(ch=>ch.active);
  if(!activeChildren.length) return [];
  const def1=kBadgesDefault(new Set([s1].filter(Boolean)));
  const def2=kBadgesDefault(new Set([s2].filter(Boolean)));
  const res=[];
  for(const ch of activeChildren){
    // 転出児童：上書きが明示的にtrueの場合のみ表示、それ以外はfalse
    const fallback1=ch.tenshutsu?false:def1.has(ch.id);
    const fallback2=ch.tenshutsu?false:def2.has(ch.id);
    const k1=(koury1&&koury1[ch.id]!==undefined)?koury1[ch.id]:fallback1;
    const k2=(koury2&&koury2[ch.id]!==undefined)?koury2[ch.id]:fallback2;
    if(k1||k2) res.push(ch);
  }
  return res;
}
// 後方互換用
function kBadges(subjSet){return kBadgesForCell([...subjSet][0]||'',[...subjSet][1]||'',null,null);}
// 1教科分のバッジ一覧（転出児童：明示上書きのみ表示）
function kBadgesForSubject(subj, koury){
  const activeChildren=S.koury.children.filter(ch=>ch.active);
  if(!activeChildren.length) return [];
  const def=kBadgesDefault(new Set([subj].filter(Boolean)));
  return activeChildren.filter(ch=>{
    const fallback=ch.tenshutsu?false:def.has(ch.id);
    const k=(koury&&koury[ch.id]!==undefined)?koury[ch.id]:fallback;
    return k;
  });
}

function buildRenderOrder(vsl){
